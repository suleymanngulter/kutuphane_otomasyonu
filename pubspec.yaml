name: kutuphane_otomasyonu
description: "Modern kütüphane yönetim sistemi - Kitap takibi, ödünç verme ve yönetim uygulaması"
publish_to: 'none'

version: 2.0.0+1

environment:
  sdk: '>=3.2.3 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  provider: ^6.1.1
  
  # Database
  sqflite: ^2.3.0
  path_provider: ^2.1.1
  path: ^1.8.3
  
  # Internationalization
  intl: ^0.19.0
  
  # UI & Icons
  cupertino_icons: ^1.0.6
  
  # Image handling
  cached_network_image: ^3.3.0
  image_picker: ^1.0.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  
  # Assets
  assets:
    - assets/images/
